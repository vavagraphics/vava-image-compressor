<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VAVA Image Compressor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/styles.css">
</head>
<body>

<div class="app">

  <!-- Header -->
  <header class="header">
    <img src="assets/vava-logo.png" alt="VAVA Graphics" class="header-logo">
    <h1 class="header-title">Web Image Compressor &amp; Converter</h1>
    <p class="tagline">Resize &middot; Compress &middot; Convert to WebP</p>
  </header>

  <!-- Drop Zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">
      <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <circle cx="8.5" cy="8.5" r="1.5"/>
        <path d="m21 15-5-5L5 21"/>
      </svg>
    </div>
    <p class="drop-text">Drop images here to compress</p>
    <p class="drop-sub">JPG &middot; PNG &middot; WebP &middot; GIF &mdash; any quantity</p>
    <button class="btn-browse" id="browseBtn">Browse Files</button>
    <input type="file" id="fileInput" multiple accept="image/*" hidden>
  </div>

  <!-- Settings Info Bar -->
  <div class="settings-bar">
    <div class="setting">
      <label>Landscape</label>
      <span>1600px</span>
    </div>
    <div class="setting">
      <label>Portrait / Square</label>
      <span>1000px</span>
    </div>
    <div class="setting">
      <label>Small (all)</label>
      <span>600px</span>
    </div>
    <div class="setting">
      <label>Quality</label>
      <span>WebP 85%</span>
    </div>
    <div class="setting">
      <label>Processing</label>
      <span>Local &mdash; no upload</span>
    </div>
  </div>

  <!-- Queue -->
  <div class="queue-section hidden" id="queueSection">
    <div class="queue-header">
      <h2>Files <span id="fileCount">0</span></h2>
      <div class="queue-actions">
        <button class="btn-clear" id="clearBtn">Clear All</button>
        <button class="btn-download-all" id="downloadZipBtn" disabled>Download ZIP</button>
      </div>
    </div>
    <div class="file-list" id="fileList"></div>
    <div class="stats-bar hidden" id="statsBar"></div>
  </div>

</div>

<script src="src/lib/jszip.min.js"></script>
<script src="src/processor.js"></script>
<script src="src/app.js"></script>

</body>
</html>
